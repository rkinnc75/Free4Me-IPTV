
# analyze.yml — Run flutter analyze on every push to main.
#
# Triggers on main-branch pushes (NOT tag pushes — those go to release.yml).
# Reports pass/fail as a commit status check in ~2 minutes, well before a
# developer would push a tag. If analyze fails here, fix and push to main
# again before pushing the tag.
#
# This is the fast feedback loop that replaces waiting for the full 10-minute
# APK build to discover a static-analysis error.

name: Analyze
# fix234: title the run by branch + short SHA so it is identifiable even
# when the last commit is a docs/chore commit.
run-name: 'Analyze ${{ github.ref_name }} @ ${{ github.sha }}'

on:
  push:
    branches:
      - main
    # fix314 follow-up: skip the redundant Analyze run triggered by the
    # "move fix files to runbooks/" housekeeping commit (apply_fix.sh step 10),
    # which is a pure file rename and re-analyzes byte-identical code. A push is
    # skipped only if EVERY changed path matches these patterns, so the fix CODE
    # commit (which also touches lib/) still triggers Analyze normally.
    paths-ignore:
      - 'runbooks/**'
      - 'fix*.md'
      - 'fix*.patch'

concurrency:
  # fix224: shared group with release.yml so the two never run concurrently
  # for the same commit (a combined commit+tag push triggers both).
  group: free4me-ci-${{ github.sha }}
  cancel-in-progress: false

# fix312 follow-up: mirror release.yml's publish-late toggle. When 'true',
# release.yml commits version.json to main only AFTER the APK is uploaded, so
# main/version.json is intentionally stale during the build window — the
# "Verify version.json is up to date" step below would false-positive on that
# expected lag, so it is skipped. To ROLL BACK to eager publishing, set
# APK_BEFORE_VERSIONJSON to 'false' here AND in release.yml (both must match).
env:
  APK_BEFORE_VERSIONJSON: 'true'

jobs:
  analyze:
    name: flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      # fix325: unit tests (Rule 8 suites: xtream retry/preserve table,
      # wipeSource vs real sqlite, EnginePreference, deviceTag sanitizer).
      - name: flutter test
        run: flutter test

      - name: Verify version.json is up to date
        # fix312 follow-up: skip while publish-late is active — version.json is
        # intentionally behind pubspec until release.yml publishes it post-APK.
        if: env.APK_BEFORE_VERSIONJSON != 'true'
        run: |
          python3 scripts/update_version_json.py
          if ! git diff --quiet version.json; then
            echo "::error::version.json is stale — run update_version_json.py locally and commit"
            git --no-pager diff version.json
            exit 1
          fi
          echo "version.json is current."
