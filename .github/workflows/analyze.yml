
# analyze.yml — Run flutter analyze on every push to main.
#
# Triggers on main-branch pushes (NOT tag pushes — those go to release.yml).
# Reports pass/fail as a commit status check in ~2 minutes, well before a
# developer would push a tag. If analyze fails here, fix and push to main
# again before pushing the tag.
#
# This is the fast feedback loop that replaces waiting for the full 10-minute
# APK build to discover a static-analysis error.

name: Analyze

on:
  push:
    branches:
      - main

jobs:
  analyze:
    name: flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Verify version.json is up to date
        run: |
          python3 scripts/update_version_json.py
          if ! git diff --quiet version.json; then
            echo "::error::version.json is stale — run update_version_json.py locally and commit"
            git --no-pager diff version.json
            exit 1
          fi
          echo "version.json is current."
