# Free4Me-IPTV release pipeline. Toolchain pinned to match BUILD-ENV.md
# (Flutter 3.44.0, Java 21 Temurin, Android SDK 36, NDK 28.2.13676358).
# `scripts/build_and_release.sh` remains supported for hands-on Mac
# releases; this workflow is the unattended equivalent.
#
# Pre-tag checklist:
#   1. Bump `version: X.Y.Z+N` in `pubspec.yaml`.
#   2. Add a `'X.Y.Z': [...]` entry at the TOP of `_changelog` in
#      `lib/whats_new_modal.dart`.
#   3. Run `python3 scripts/update_version_json.py` to refresh `version.json`.
#   4. Commit, push to `main`, then push tag `vX.Y.Z`.
#
# version.json MUST be on `main` before the tag — the in-app update
# checker fetches it from `raw.githubusercontent.com/.../main/version.json`.
# The "Verify version.json is up to date" step enforces this.
#
# Secrets (fix31 — release keystore migration, v1.17.0+):
#   * RELEASE_KEYSTORE_B64       — base64 of `android/app/release.keystore`.
#   * RELEASE_KEYSTORE_PASSWORD  — keystore password.
#   * RELEASE_KEY_ALIAS          — key alias (`free4me-iptv` by default).
#   * RELEASE_KEY_PASSWORD       — key password (PKCS12: same as store pwd).
#
# Together these reconstruct `android/key.properties` + the keystore file
# so `flutter build apk --release` signs with the project's stable release
# identity. The fingerprint never changes across releases or build machines,
# so updates install cleanly on top of any prior install indefinitely.
#
# If any secret is missing the workflow FAILS FAST rather than silently
# falling back to a debug-signed APK (which would re-introduce the v1.16.x
# "uninstall to update" pain).

name: Release
# fix234: title the run by the tag/version (and dispatch) instead of the
# last commit message, which was often a 'move fixNNN.md to runbooks/' chore.
run-name: "Release ${{ github.event_name == 'workflow_dispatch' && 'manual dispatch' || github.ref_name }}"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, build but do not create the GitHub release.'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  # fix224: shared group across analyze.yml + release.yml so a combined
  # commit+tag push does not run them simultaneously — they queue instead.
  group: free4me-ci-${{ github.sha }}
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # fix312: when 'true', version.json is committed to main AFTER the APK is
  # uploaded to the release (closes the 404 window where the in-app updater saw
  # the new version before its APK asset existed). To ROLL BACK to the original
  # fix290 ordering (version.json synced early in the analyze job), set this to
  # 'false' — that fully restores the previous, proven behavior with no other
  # change required.
  APK_BEFORE_VERSIONJSON: 'true'

jobs:
  analyze:
    name: flutter analyze (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # fix282: need write credentials to auto-sync version.json + re-tag.
          persist-credentials: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        # HARD GATE: build-and-release `needs: analyze`, so a failure here blocks
        # the APK build and the entire release on this tagged commit. This makes
        # the job live up to its "(gate)" name — previously it only ran pub get +
        # version.json sync and never actually analyzed. Mirrors analyze.yml's
        # invocation (2 tolerated settings_view.dart INFOs; warnings/errors fail).
        run: flutter analyze --no-fatal-infos

      # fix325: tests are part of the hard gate — a failure here blocks the
      # build (build-and-release `needs: analyze`).
      - name: flutter test
        run: flutter test

      - name: Sync version.json on the tagged commit (self-healing)
        # fix312: only when ROLLED BACK to the original ordering. When the
        # reorder is active ('true'), version.json is committed after the APK
        # upload in the build-and-release job instead.
        if: env.APK_BEFORE_VERSIONJSON != 'true'
        env:
          GH_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 scripts/update_version_json.py
          if git diff --quiet version.json; then
            echo "version.json is current — nothing to do."
            exit 0
          fi
          echo "version.json was stale — regenerating, committing to main, and moving $GH_TAG."
          git --no-pager diff version.json || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # fix284: park the just-regenerated version.json so the branch switch
          # below cannot be blocked by "local changes would be overwritten".
          git stash --include-untracked || true
          # Commit the regenerated version.json onto main, then point the tag here.
          git fetch origin main
          git checkout -B main origin/main
          git stash drop || true
          python3 scripts/update_version_json.py
          if ! git diff --quiet version.json; then
            git add version.json
            git commit -m "${GH_TAG}: CI sync version.json"
            git push origin main
          fi
          NEW_SHA="$(git rev-parse HEAD)"
          git tag -f "${GH_TAG}" "${NEW_SHA}"
          git push -f origin "refs/tags/${GH_TAG}"
          echo "Moved ${GH_TAG} to ${NEW_SHA} with synced version.json."
          # Re-verify; fail only if something is still wrong (should never happen).
          python3 scripts/update_version_json.py
          if ! git diff --quiet version.json; then
            echo "::error::version.json still stale after self-heal — aborting."
            git --no-pager diff version.json
            exit 1
          fi
          echo "version.json is current."

  build-and-release:
    needs: analyze
    name: Build APK and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed by the version.json freshness check.
          fetch-depth: 0
          # fix312: this job now commits version.json + moves the tag after the
          # APK upload, so it needs write credentials persisted.
          persist-credentials: true

      - name: Resolve version from pubspec.yaml
        id: ver
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | head -1 \
            | awk '{print $2}' | cut -d+ -f1)
          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not read version from pubspec.yaml"
            exit 1
          fi
          TAG="v${VERSION}"
          APK_NAME="Free4Me-IPTV-${VERSION}-arm64.apk"
          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "apk_name=$APK_NAME"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION  tag=$TAG  apk=$APK_NAME"

      - name: Verify tag matches pubspec.yaml
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          PUSHED_TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED_TAG="${{ steps.ver.outputs.tag }}"
          if [[ "$PUSHED_TAG" != "$EXPECTED_TAG" ]]; then
            echo "::error::Pushed tag '$PUSHED_TAG' does not match" \
                 "pubspec.yaml version '$EXPECTED_TAG'."
            echo "::error::Bump pubspec.yaml first, commit, then tag."
            exit 1
          fi
          echo "Tag/pubspec match: $PUSHED_TAG"

      - name: Ensure version.json is current (regenerate, non-fatal)
        run: |
          set -euo pipefail
          # fix282: the analyze job self-heals + re-tags; by the time this runs
          # the tag points at a commit with correct version.json. Regenerate
          # defensively so the built release notes are always current, but do
          # NOT fail the build here.
          python3 scripts/update_version_json.py
          echo "version.json regenerated for build."

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;28.2.13676358'
          accept-android-sdk-licenses: true

      - name: Restore release keystore + key.properties from secrets
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_KEYSTORE_B64:-}" \
             || -z "${RELEASE_KEYSTORE_PASSWORD:-}" \
             || -z "${RELEASE_KEY_ALIAS:-}" \
             || -z "${RELEASE_KEY_PASSWORD:-}" ]]; then
            echo "::error::One or more RELEASE_KEYSTORE_* secrets are missing."
            echo "::error::Set them at" \
                 "https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
            echo "::error::See fix31.md / CLAUDE-WORKFLOW.md."
            exit 1
          fi

          mkdir -p android/app
          printf '%s' "$RELEASE_KEYSTORE_B64" \
            | base64 -d > android/app/release.keystore
          chmod 600 android/app/release.keystore

          # Use printf (not heredoc) so the YAML indent in this run: block
          # doesn't leak into key.properties — Gradle won't parse a line
          # like "          storeFile=…".
          {
            printf 'storeFile=release.keystore\n'
            printf 'storePassword=%s\n' "$RELEASE_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n'      "$RELEASE_KEY_ALIAS"
            printf 'keyPassword=%s\n'   "$RELEASE_KEY_PASSWORD"
          } > android/key.properties
          chmod 600 android/key.properties

          echo "Release keystore restored. Fingerprint:"
          keytool -list -v \
            -keystore android/app/release.keystore \
            -storepass "$RELEASE_KEYSTORE_PASSWORD" \
            -alias "$RELEASE_KEY_ALIAS" 2>/dev/null \
            | grep -iE 'sha[0-9-]+:' || true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter pub outdated
        run: flutter pub outdated
        
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-
            
      - name: flutter build apk --release
        env:
          # ubuntu-latest runners have 7 GB RAM. Earlier 2G cap caused
          # an OOM in media_kit_libs_android_video's JNI-libs copy task
          # (libmpv .so files for 4 ABIs are big). 5G gives plenty of
          # headroom for both Gradle and the Kotlin daemon while still
          # leaving room for the OS + the runner agent.
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx5G -XX:MaxMetaspaceSize=1G'
        run: flutter build apk --release

      - name: Stage APK with release naming
        id: apk
        run: |
          set -euo pipefail
          src='build/app/outputs/flutter-apk/app-release.apk'
          dst="${{ steps.ver.outputs.apk_name }}"
          if [[ ! -s "$src" ]]; then
            echo "::error::APK missing at $src"
            ls -la build/app/outputs/flutter-apk/ || true
            exit 1
          fi
          cp "$src" "$dst"
          ls -lh "$dst"
          {
            echo "path=$dst"
            echo "size_bytes=$(stat -c%s "$dst")"
          } >> "$GITHUB_OUTPUT"

      - name: Compose release notes from version.json
        id: notes
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/notes.md
          import json, pathlib
          data = json.loads(pathlib.Path("version.json").read_text(encoding="utf-8"))
          version = data.get("latest", "")
          notes = data.get("releaseNotes", "")
          print(f"## Free4Me-IPTV v{version}\n")
          print("Install by sideloading the APK on your Android TV device.\n")
          print("### Changes\n")
          print(notes)
          print("")
          print("---")
          print("Built by [.github/workflows/release.yml]"
                "(.github/workflows/release.yml). See "
                "[DEVELOPMENT-HANDBOOK.md]"
                "(https://github.com/rkinnc75/Free4Me-IPTV/blob/main/"
                "DEVELOPMENT-HANDBOOK.md) for the full feature roadmap.")
          PY
          echo "--- Generated notes ---"
          cat /tmp/notes.md

      - name: Create or update GitHub release
        if: github.event_name == 'push' || inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG='${{ steps.ver.outputs.tag }}'
          APK='${{ steps.apk.outputs.path }}'

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading APK (clobber)..."
            gh release upload "$TAG" "$APK" --clobber
            gh release edit "$TAG" --notes-file /tmp/notes.md
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" "$APK" \
              --title "$TAG" \
              --notes-file /tmp/notes.md
          fi

          echo ""
          echo "Done. Release live at:"
          echo "  https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

      # fix312: with the reorder active, commit version.json to main and move the
      # tag onto that commit ONLY NOW — after the APK asset is uploaded above.
      # This closes the window where the in-app updater saw the new version
      # before its APK existed (HTTP 404). Verifies the APK is actually
      # downloadable first. Preserves fix290: version.json lands on main and the
      # tag is moved to that same commit (tag stays at main's tip).
      - name: Sync version.json AFTER APK upload (reorder)
        if: env.APK_BEFORE_VERSIONJSON == 'true' && (github.event_name == 'push' || inputs.dry_run != 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_TAG: ${{ steps.ver.outputs.tag }}
          APK_NAME: ${{ steps.ver.outputs.apk_name }}
        run: |
          set -euo pipefail
          # 1. Confirm the APK asset is actually downloadable before advertising.
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GH_TAG}/${APK_NAME}"
          echo "Verifying APK is live: $ASSET_URL"
          # fix: GitHub release-asset propagation can lag behind the upload;
          # give it longer (12 × 10s ≈ 2 min) before declaring failure.
          for i in $(seq 1 12); do
            CODE="$(curl -s -o /dev/null -w '%{http_code}' -L "$ASSET_URL" || echo 000)"
            echo "  attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then APK_OK=1; break; fi
            sleep 10
          done
          if [ "${APK_OK:-0}" != "1" ]; then
            echo "::error::APK asset not downloadable after upload — NOT advertising version.json."
            exit 1
          fi
          echo "APK confirmed live."

          # 2. Now commit version.json to main and move the tag onto that commit.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # fix325 follow-up: the earlier "Ensure version.json is current
          # (regenerate, non-fatal)" build step leaves version.json dirty in the
          # working tree, which makes the checkout below abort with "local
          # changes would be overwritten" (observed on the fix324/fix325 back-to-
          # back release race). Stash it first (mirrors the analyze-job
          # self-heal step); we regenerate version.json fresh right after.
          git stash --include-untracked || true
          git checkout -B main origin/main
          git stash drop || true
          python3 scripts/update_version_json.py
          if ! git diff --quiet version.json; then
            git add version.json
            git commit -m "${GH_TAG}: CI sync version.json (after APK upload, fix312)"
            git push origin main
            echo "version.json committed to main."
          else
            echo "version.json already current on main."
          fi
          NEW_SHA="$(git rev-parse HEAD)"
          git tag -f "${GH_TAG}" "${NEW_SHA}"
          git push -f origin "refs/tags/${GH_TAG}"
          echo "Moved ${GH_TAG} to ${NEW_SHA} (main tip, version.json present)."
          # 3. Final guard — version.json must be current.
          python3 scripts/update_version_json.py
          if ! git diff --quiet version.json; then
            echo "::error::version.json still stale after sync — aborting."
            git --no-pager diff version.json
            exit 1
          fi
          echo "version.json is current."

      - name: Dry-run summary (skipped release)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: |
          echo "Dry run requested via workflow_dispatch."
          echo "APK built at: ${{ steps.apk.outputs.path }}"
          echo "Size: ${{ steps.apk.outputs.size_bytes }} bytes"
          echo "No GitHub release was created."

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.apk_name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14
