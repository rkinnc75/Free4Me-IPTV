plugins {
    id "com.android.application"
    // kotlin-android removed: dev.flutter.flutter-gradle-plugin applies Kotlin
    // automatically via Built-in Kotlin support (Flutter >= 3.27). Keeping the
    // explicit plugin triggered the "Future versions will fail to build" KGP warning.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "me.free4me.iptv"
    compileSdk = 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }
    
    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "me.free4me.iptv"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Free4Me-IPTV v1.4: Google Cast SDK for Chromecast support.
    // play-services-cast-framework bundles the Cast SDK and its transitive deps.
    implementation 'com.google.android.gms:play-services-cast-framework:21.5.0'
    // MediaRouter is required for the device picker dialog.
    implementation 'androidx.mediarouter:mediarouter:1.7.0'
}
