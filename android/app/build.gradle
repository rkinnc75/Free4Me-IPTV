plugins {
    id "com.android.application"
    // kotlin-android removed: dev.flutter.flutter-gradle-plugin applies Kotlin
    // automatically via Built-in Kotlin support (Flutter >= 3.27). Keeping the
    // explicit plugin triggered the "Future versions will fail to build" KGP warning.
    id "dev.flutter.flutter-gradle-plugin"
}

// fix31: dedicated release keystore.
//
// `android/key.properties` is gitignored and lives only on machines that are
// authorized to ship releases (the user's Mac, the GitHub Actions runner
// after the workflow restores it from RELEASE_KEYSTORE_B64). When present,
// release builds sign with `android/app/release.keystore`. When absent
// (fresh checkout, contributor's machine), release builds fall back to the
// debug keystore so `flutter run --release` still works locally — those
// builds just can't be shipped as updates to existing users.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasReleaseKeystore = keystorePropertiesFile.exists()
if (hasReleaseKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "me.free4me.iptv"
    compileSdk = 36
    ndkVersion = "28.2.13676358" // fix43: silence jni NDK version mismatch warning

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "me.free4me.iptv"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = file(keystoreProperties['storeFile'])
                storePassword = keystoreProperties['storePassword']
                // fix548: enable the v1 (JAR) APK signature in addition to v2.
                // Some Google Play Protect heuristics weight the presence of a
                // v1 signature as a "known-app" signal. Strictly additive and
                // safe on all supported API levels.
                // fix724: add the v3 signature (Android 9+). v3 is NOT enabled
                // by default in AGP (the fix548 comment claiming "default true"
                // was wrong — releases verified as v1+v2 only). v3's value is
                // key ROTATION: if the release keystore is ever compromised or
                // must be replaced, v3 lets us rotate to a new key without
                // breaking updates for the installed base — critical for a
                // sideloaded app whose entire update path depends on cert
                // continuity. No rotation is performed here; the key/cert and
                // its SHA-256 are unchanged, so updates install over prior
                // releases exactly as before. (Old property names
                // v1SigningEnabled/v2SigningEnabled replaced with the modern
                // enableV*Signing aliases — same semantics.)
                enableV1Signing = true
                enableV2Signing = true
                enableV3Signing = true
            }
        }
    }

    buildTypes {
        release {
            // Use the dedicated release keystore when configured. Otherwise
            // sign with debug so unconfigured checkouts can still produce a
            // runnable release APK (e.g. `flutter run --release` locally) —
            // those builds are not safe to distribute as updates to existing
            // installs.
            signingConfig = hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug

            // fix590 (#16): R8 code + resource shrinking. proguard-rules.pro
            // keeps the JNI / reflection / manifest-referenced classes that R8
            // would otherwise strip or rename (media_kit, Cast, workmanager,
            // foreground-task, the plus plugins, MainActivity/Application).
            // -dontobfuscate is set in the rules file for this FIRST pass so a
            // crash can never be a renamed-symbol mismatch; revisit renaming
            // only after on-device soak.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Free4Me-IPTV v1.4: Google Cast SDK for Chromecast support.
    // play-services-cast-framework bundles the Cast SDK and its transitive deps.
    implementation 'com.google.android.gms:play-services-cast-framework:21.5.0'
    // MediaRouter is required for the device picker dialog.
    implementation 'androidx.mediarouter:mediarouter:1.7.0'
    // fix665: TvContractCompat for publishing favorites to the Android TV
    // home-screen preview-channel row.
    implementation 'androidx.tvprovider:tvprovider:1.0.0'
}
