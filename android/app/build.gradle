plugins {
    id "com.android.application"
    // kotlin-android removed: dev.flutter.flutter-gradle-plugin applies Kotlin
    // automatically via Built-in Kotlin support (Flutter >= 3.27). Keeping the
    // explicit plugin triggered the "Future versions will fail to build" KGP warning.
    id "dev.flutter.flutter-gradle-plugin"
}

// fix31: dedicated release keystore.
//
// `android/key.properties` is gitignored and lives only on machines that are
// authorized to ship releases (the user's Mac, the GitHub Actions runner
// after the workflow restores it from RELEASE_KEYSTORE_B64). When present,
// release builds sign with `android/app/release.keystore`. When absent
// (fresh checkout, contributor's machine), release builds fall back to the
// debug keystore so `flutter run --release` still works locally — those
// builds just can't be shipped as updates to existing users.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasReleaseKeystore = keystorePropertiesFile.exists()
if (hasReleaseKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "me.free4me.iptv"
    compileSdk = 36
    ndkVersion = "28.2.13676358" // fix43: silence jni NDK version mismatch warning

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "me.free4me.iptv"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = file(keystoreProperties['storeFile'])
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // Use the dedicated release keystore when configured. Otherwise
            // sign with debug so unconfigured checkouts can still produce a
            // runnable release APK (e.g. `flutter run --release` locally) —
            // those builds are not safe to distribute as updates to existing
            // installs.
            signingConfig = hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Free4Me-IPTV v1.4: Google Cast SDK for Chromecast support.
    // play-services-cast-framework bundles the Cast SDK and its transitive deps.
    implementation 'com.google.android.gms:play-services-cast-framework:21.5.0'
    // MediaRouter is required for the device picker dialog.
    implementation 'androidx.mediarouter:mediarouter:1.7.0'
}
